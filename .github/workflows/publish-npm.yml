name: Publish npm

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      HAS_HOMEBREW_TOKEN: ${{ secrets.HOMEBREW_GITHUB_TOKEN != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install native dependencies
        run: sudo apt-get update && sudo apt-get install -y libsecret-1-dev

      - name: Install
        run: npm install

      - name: Validate npm auth
        run: npm whoami
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN || secrets.NPM }}

      - name: Verify release
        run: npm run verify:release

      - name: Align package scope (if needed)
        run: |
          # Only attempt to rename if the package name doesn't start with @
          PKG_NAME="$(node -p "require('./package.json').name")"
          if [[ ! "$PKG_NAME" =~ ^@ ]]; then
            export NPM_USER="$(npm whoami)"
            node -e 'const fs=require("fs");const pkg=require("./package.json");const user=process.env.NPM_USER;pkg.name=`@${user}/mesh-agent-cli`;fs.writeFileSync("package.json", JSON.stringify(pkg,null,2)+"\n");'
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN || secrets.NPM }}

      - name: Check if version already exists
        id: version_check
        run: |
          PKG_NAME="$(node -p "require('./package.json').name")"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if npm view "${PKG_NAME}@${PKG_VERSION}" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Version ${PKG_NAME}@${PKG_VERSION} already exists. Skipping publish."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Version ${PKG_NAME}@${PKG_VERSION} is new. Proceeding with publish."
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN || secrets.NPM }}

      - name: Publish to npm
        if: steps.version_check.outputs.exists == 'false'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN || secrets.NPM }}

      - name: Verify published install
        if: steps.version_check.outputs.exists == 'false'
        run: |
          sleep 10
          npm run smoke:published

      - name: Update Homebrew Tap
        if: steps.version_check.outputs.exists == 'false' && env.HAS_HOMEBREW_TOKEN == 'true'
        run: |
          # The package might take a few seconds to become available on NPM
          sleep 10 
          ./scripts/update-brew.sh
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_GITHUB_TOKEN }}

      - name: Skip Homebrew Tap
        if: steps.version_check.outputs.exists == 'false' && env.HAS_HOMEBREW_TOKEN != 'true'
        run: echo "HOMEBREW_GITHUB_TOKEN is not configured; npm release succeeded, Homebrew update skipped."

      - name: Already published
        if: steps.version_check.outputs.exists == 'true'
        run: echo "No publish needed for this version."
