name: Publish npm

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install
        run: npm install

      - name: Build
        run: npm run build

      - name: Verify build
        run: ls -R dist/

      - name: Align package scope with npm token owner
        run: |
          export NPM_USER="$(npm whoami)"
          if [ -z "$NPM_USER" ]; then
            echo "npm whoami returned empty user. Check NPM/NPM_TOKEN secret."
            exit 1
          fi
          node -e 'const fs=require("fs");const pkg=require("./package.json");const user=process.env.NPM_USER;pkg.name=`@${user}/mesh-agent-cli`;fs.writeFileSync("package.json", JSON.stringify(pkg,null,2)+"\n");console.log("Publishing package",pkg.name);'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN || secrets.NPM }}

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN || secrets.NPM }}
