name: Publish npm

on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install
        run: npm install

      - name: Build
        run: npm run build

      - name: Set CI publish version
        run: |
          node -e 'const fs=require("fs");const pkg=require("./package.json");const [major,minor]=String(pkg.version||"0.1.0").split(".");const run=process.env.GITHUB_RUN_NUMBER||"0";const attempt=process.env.GITHUB_RUN_ATTEMPT||"1";const version=`${major}.${minor}.${run}${attempt==="1"?"":`-run.${attempt}`}`;pkg.version=version;fs.writeFileSync("package.json", JSON.stringify(pkg,null,2)+"\n");console.log("Publishing version",version);'

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN || secrets.NPM }}
